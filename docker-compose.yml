version: "3.8"

services:
  db:
    image: postgres:16
    container_name: cuidar_db
    restart: always
    environment:
      POSTGRES_DB: cuidar_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d cuidar_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: cuidar
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /api

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cuidar_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"

      SPRING_JACKSON_TIME_ZONE: America/Sao_Paulo
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE: America/Sao_Paulo

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

volumes:
  pg_data:

networks:
  backend:
    driver: bridge
